# /etc/nginx/sites-available/iytebot  (symlink into sites-enabled)
# certbot --nginx adds the 443 server block and the redirect; keep this
# file to port 80 and let certbot manage TLS.

# coarse per-IP brake in front of the app's own rate limiting
limit_req_zone $binary_remote_addr zone=iytebot:10m rate=60r/m;

server {
    listen 80;
    listen [::]:80;
    server_name _;  # replace with your domain before running certbot

    # images ride in the chat request body as base64 (downscaled ~1568px
    # client-side, MAX_IMAGE_CHARS is ~6MB in the app)
    client_max_body_size 10m;

    location / {
        limit_req zone=iytebot burst=30 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # /chat/stream is a long-lived streaming response: no buffering,
        # and give slow LLM answers time to finish
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
