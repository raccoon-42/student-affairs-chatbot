services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
    volumes:
      # users/conversations SQLite shared with the host, like prod
      - ./data:/app/data
      # cache downloaded embedding models between container restarts
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - qdrant

  check-updates:
    build: .
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      # subprocess output block-buffers without a TTY, scrambling the logs
      PYTHONUNBUFFERED: "1"
    volumes:
      # corpora, manifests and index_state.json stay on the host, shared
      # with manual runs of the scrapers/parsers/vectorizer
      - ./preprocessing/data:/app/preprocessing/data
    depends_on:
      - qdrant
    command:
      - sh
      - -c
      # on first start (no recorded index state) the baseline check runs
      # right away, so `docker compose up` alone indexes a fresh clone;
      # then daily at 06:30 UTC (09:30 TR) — sleep-until keeps restarts
      # from re-running the check immediately
      - |
        until python -c 'import os, requests; requests.get(os.environ["QDRANT_URL"] + "/readyz", timeout=2).raise_for_status()' 2>/dev/null; do
          echo "waiting for qdrant..."; sleep 2
        done
        if [ ! -f preprocessing/data/index_state.json ]; then
          echo "no recorded index state — running baseline corpus check"
          python -m preprocessing.check_updates || echo "baseline check failed — will retry at the daily check"
        fi
        while true; do
          next=$$(python -c 'import datetime as d; n=d.datetime.now(); t=n.replace(hour=6,minute=30,second=0,microsecond=0); print(int(((t if t>n else t+d.timedelta(days=1))-n).total_seconds()))')
          echo "next corpus check in $${next}s"
          sleep "$$next"
          python -m preprocessing.check_updates || echo "check_updates failed — retrying tomorrow"
        done

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  hf_cache:
  qdrant_storage:
