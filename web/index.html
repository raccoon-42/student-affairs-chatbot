<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>İyteBot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <aside id="sidebar">
    <button id="new-conversation" type="button">
      <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Yeni konuşma
    </button>
    <nav id="conversation-list"></nav>

    <div id="auth" hidden>
      <div id="signin-button"></div>
      <div id="user-chip" hidden>
        <img id="user-picture" alt="" referrerpolicy="no-referrer">
        <div class="user-info">
          <span id="user-name"></span>
          <span id="user-badge" hidden>İYTE</span>
        </div>
        <button id="logout" type="button" aria-label="Çıkış yap">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <div id="overlay"></div>

  <div class="chat">
    <header>
      <button id="menu" type="button" aria-label="Menü">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <h1>İyteBot</h1>
      <button id="theme-toggle" type="button" aria-label="Tema değiştir">
        <svg id="icon-sun" viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M19.1 4.9L17 7M7 17l-2.1 2.1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <svg id="icon-moon" viewBox="0 0 24 24" width="18" height="18"><path d="M21 13A9 9 0 1 1 11 3a7 7 0 0 0 10 10z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
      </button>
    </header>

    <main id="messages">
      <div id="empty-state">
        <p>Akademik takvim, kayıtlar ve yönetmelikler hakkında soru sorabilirsin.</p>
      </div>
    </main>

    <form id="form" autocomplete="off">
      <input id="input" type="text" placeholder="Sorunu yaz..." required>
      <button id="send" type="submit" aria-label="Gönder">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M4 12l16-8-6 16-2.5-6.5L4 12z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
      </button>
    </form>
  </div>

  <dialog id="profile-dialog">
    <form id="profile-form" method="dialog">
      <h2>Seni tanıyalım</h2>
      <p>Sorularını daha iyi yanıtlayabilmek için eğitim durumunu seç.</p>
      <label><input type="radio" name="education_type" value="aday" required> Aday öğrenci (İYTE'yi düşünüyorum)</label>
      <label><input type="radio" name="education_type" value="lisans"> Lisans öğrencisi</label>
      <label><input type="radio" name="education_type" value="yukseklisans"> Yüksek lisans öğrencisi</label>
      <label><input type="radio" name="education_type" value="doktora"> Doktora öğrencisi</label>
      <button type="submit">Kaydet</button>
    </form>
  </dialog>

  <dialog id="limit-dialog" autofocus>
    <button type="button" class="dialog-close" data-close aria-label="Kapat">
      <svg viewBox="0 0 24 24" width="16" height="16"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <div class="dialog-icon">
      <svg viewBox="0 0 24 24" width="26" height="26"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 7v5l3.5 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </div>
    <h2>Mesaj limitine ulaştın</h2>
    <p id="limit-text"></p>
    <div id="limit-signin"></div>
  </dialog>

  <dialog id="abuse-dialog" autofocus>
    <div class="dialog-icon danger">
      <svg viewBox="0 0 24 24" width="26" height="26"><path d="M12 3L2 21h20L12 3z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M12 10v5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="18" r="0.5" fill="currentColor" stroke="currentColor"/></svg>
    </div>
    <h2>Uygunsuz dil</h2>
    <p id="abuse-text"></p>
    <p class="dialog-note">Uygunsuz dil nedeniyle mesaj gönderimi engellendi.</p>
  </dialog>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="app.js"></script>
</body>
</html>
