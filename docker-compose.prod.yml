# Production stack (VPS). Standalone on purpose — no override merging:
#   docker compose -f docker-compose.prod.yml up -d --build
# Differences from the dev compose:
#   - api binds to 127.0.0.1 only; nginx on the host terminates HTTPS
#     and proxies to it (deploy/nginx.conf)
#   - --proxy-headers so rate limiting sees the real client IP, not nginx
#   - qdrant publishes no ports at all — only reachable on the compose network
#   - ./data (SQLite) and ./preprocessing/data are bind-mounted so users,
#     conversations, corpora and index state survive rebuilds
#   - restart: unless-stopped everywhere
services:
  api:
    build: .
    command: uvicorn app.api.api:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips "*"
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./data:/app/data
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - qdrant
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  check-updates:
    build: .
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./preprocessing/data:/app/preprocessing/data
    depends_on:
      - qdrant
    restart: unless-stopped
    command:
      - sh
      - -c
      # daily at 06:30 UTC (09:30 TR); sleep-until keeps restarts from
      # re-running the check immediately
      - |
        while true; do
          next=$$(python -c 'import datetime as d; n=d.datetime.now(); t=n.replace(hour=6,minute=30,second=0,microsecond=0); print(int(((t if t>n else t+d.timedelta(days=1))-n).total_seconds()))')
          echo "next corpus check in $${next}s"
          sleep "$$next"
          python -m preprocessing.check_updates || echo "check_updates failed — retrying tomorrow"
        done

volumes:
  hf_cache:
  qdrant_storage:
